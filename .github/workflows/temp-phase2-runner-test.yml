# TEMPORARY — Phase 2 verification (b) + (d). Delete after Phase 2 sign-off.
#
# Proves market-data reachability from GitHub's runner IPs (Azure/AWS ranges,
# which KRX has historically blocked) and tests intraday freshness at 12:30 KST.
#
# cron: 2026-06-12 03:30 UTC = 12:30 KST (one-shot for the intraday test;
# Actions cron may lag 15-30 min at busy times — acceptable here).
name: temp-phase2-runner-test

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 12 6 *"

# Same group every data-writing workflow will use; declared here to verify
# that overlapping runs queue instead of clobbering each other.
concurrency:
  group: data-storage-branch
  cancel-in-progress: false

jobs:
  runner-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run runner feasibility test
        run: python tests/verify_phase2_runner.py
