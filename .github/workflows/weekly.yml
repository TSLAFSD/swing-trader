# Weekly maintenance: 일요일 04:07 KST = Saturday 19:07 UTC. Triggered by the
# Cloudflare Worker cron (repository_dispatch: cron-weekly) — GitHub-native
# schedule was retired (multi-hour lag).
# Strategy re-validation, live-tracking report, circuit-breaker review,
# universe cache refresh, data compaction (no deletion — retention is forever).
name: weekly

on:
  repository_dispatch:
    types: [cron-weekly]
  workflow_dispatch:

concurrency:
  group: data-storage-branch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 300 # full re-validation is the long pole
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run weekly job
        run: python main.py weekly 2>&1 | tee run.log
      - name: Failure alert (Telegram)
        if: failure()
        run: python -m src.notify.error_alert "주간 점검" run.log
