# US confirmed scan (Russell 1000): 화-토 07:07 KST = Mon-Fri 22:07 UTC.
# Triggered by the Cloudflare Worker cron (repository_dispatch: cron-us-close) —
# GitHub-native schedule was retired (multi-hour lag).
name: us-close

on:
  repository_dispatch:
    types: [cron-us-close]
  workflow_dispatch:

concurrency:
  group: data-storage-branch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run US confirmed scan
        run: python main.py scan-us 2>&1 | tee run.log
      - name: Commit trailing-stop state if changed # U7/G-1: diff only on real change
        run: |
          if ! git diff --quiet config/positions.yaml; then
            git config user.email "pipeline@swing-trader"
            git config user.name "swing-trader pipeline"
            git add config/positions.yaml
            git commit -m "positions: trailing-stop state (us-close)"
            git push
          fi
      - name: Failure alert (Telegram)
        if: failure()
        run: python -m src.notify.error_alert "미국 정규 스캔" run.log
