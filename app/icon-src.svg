<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161c27"/>
      <stop offset="1" stop-color="#0b0e13"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#26a69a"/>
      <stop offset="1" stop-color="#5aa2ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- candlesticks (within safe zone ~ 96..416) -->
  <g stroke-linecap="round">
    <line x1="150" y1="300" x2="150" y2="372" stroke="#2f3a4c" stroke-width="10"/>
    <rect x="134" y="316" width="32" height="44" rx="6" fill="#2f3a4c"/>
    <line x1="256" y1="232" x2="256" y2="338" stroke="#26a69a" stroke-width="10" opacity="0.5"/>
    <rect x="240" y="252" width="32" height="62" rx="6" fill="#26a69a" opacity="0.55"/>
    <line x1="362" y1="150" x2="362" y2="250" stroke="#5aa2ff" stroke-width="10" opacity="0.5"/>
    <rect x="346" y="172" width="32" height="58" rx="6" fill="#5aa2ff" opacity="0.55"/>
  </g>
  <!-- upward swing line -->
  <polyline points="118,360 200,300 286,322 396,150"
    fill="none" stroke="url(#line)" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="396" cy="150" r="17" fill="#5aa2ff" filter="url(#glow)"/>
</svg>
